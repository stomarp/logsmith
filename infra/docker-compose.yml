services:
  postgres:
    image: postgres:16
    container_name: logsmith-postgres
    environment:
      POSTGRES_DB: logsmith
      POSTGRES_USER: logsmith_user
      POSTGRES_PASSWORD: logsmith_password
    ports:
      - "5433:5432"
    volumes:
      - logsmith_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  logsmith_postgres_data: